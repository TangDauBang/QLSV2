<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Sinh viên - Giảng viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: fixed;
            color: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            text-align: center;
            padding: 25px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            font-size: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #fff;
            padding-left: 25px;
        }

        .main {
            margin-left: 230px;
            padding: 25px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        .breadcrumb {
            color: #999;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        /* Class Info Section */
        .class-info {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-card {
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .info-card-label {
            font-size: 12px;
            color: #999;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .info-card-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        /* Back button */
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f2f5;
        }

        tbody tr {
            transition: background 0.3s;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Inline action buttons */
        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-score {
            background: #f39c12;
            color: white;
        }

        .btn-score:hover {
            background: #d68910;
            box-shadow: 0 2px 8px rgba(243, 156, 18, 0.3);
        }

        /* Status badges */
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-score {
            background: #d4edda;
            color: #155724;
        }

        .badge-noscore {
            background: #fff3cd;
            color: #856404;
        }

        /* Empty message */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
            }
            .main {
                margin-left: 0;
                padding: 15px;
            }
            .class-info {
                grid-template-columns: 1fr;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Giảng Viên</h2>
    <a th:href="@{/giangvien/home}">🏠 Trang chủ</a>
    <a th:href="@{/giangvien/lopmonhoc}" class="active">📖 Lớp môn học</a>
    <a th:href="@{/giangvien/profile}">👤 Thông tin cá nhân</a>
    <a th:href="@{/giangvien/password/change}">🔐 Đổi mật khẩu</a>
</div>

<div class="main">
    <div class="back-button">
        <a th:href="@{/giangvien/lopmonhoc}">
            <button class="btn btn-secondary">← Quay lại</button>
        </a>
    </div>

    <h1>👥 Danh sách Sinh viên</h1>
    <div class="breadcrumb">
        <a th:href="@{/giangvien/lopmonhoc}">Lớp môn học</a> > 
        <span th:text="${lop.monHoc.tenMon + ' - Nhóm ' + lop.nhom}"></span>
    </div>

    <!-- Class Information -->
    <div class="class-info">
        <div class="info-card">
            <div class="info-card-label">📚 Môn học</div>
            <div class="info-card-value" th:text="${lop.monHoc.tenMon}"></div>
        </div>
        <div class="info-card">
            <div class="info-card-label">📝 Tín chỉ</div>
            <div class="info-card-value" th:text="${lop.monHoc.soTinChi}"></div>
        </div>
        <div class="info-card">
            <div class="info-card-label">📅 Thời gian</div>
            <div class="info-card-value" 
                 th:text="${lop.ngayHoc + ', Tiết ' + lop.tietBatDau + '-' + lop.tietKetThuc}"></div>
        </div>
        <div class="info-card">
            <div class="info-card-label">🏠 Phòng học</div>
            <div class="info-card-value" th:text="${lop.phongHoc}"></div>
        </div>
        <div class="info-card">
            <div class="info-card-label">👨‍🎓 Số sinh viên</div>
            <div class="info-card-value" th:text="${totalStudents}"></div>
        </div>
    </div>

    <!-- Students Table -->
    <div class="table-container">
        <table th:if="${#lists.isEmpty(danhSachDangKy)}">
            <tr>
                <td colspan="7" class="empty-message">
                    <div style="font-size: 48px; margin-bottom: 10px;">📭</div>
                    <div>Không có sinh viên nào đăng ký lớp này</div>
                </td>
            </tr>
        </table>

        <table th:unless="${#lists.isEmpty(danhSachDangKy)}">
            <thead>
                <tr>
                    <th style="width: 8%;">STT</th>
                    <th style="width: 15%;">Mã SV</th>
                    <th style="width: 20%;">Họ tên</th>
                    <th style="width: 18%;">Email</th>
                    <th style="width: 12%;">Điểm TK</th>
                    <th style="width: 12%;">Xếp loại</th>
                    <th style="width: 15%;">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="dk, iter : ${danhSachDangKy}">
                    <td th:text="${iter.count}"></td>
                    <td th:text="${dk.sinhVien.maSV}"></td>
                    <td>
                        <strong th:text="${dk.sinhVien.hoTen}"></strong>
                    </td>
                    <td th:text="${dk.sinhVien.email}"></td>
                    <td>
                        <span th:if="${dk.diem != null && dk.diem.diemTongKet != null}"
                              th:text="${#numbers.formatDecimal(dk.diem.diemTongKet, 0, 1)}"></span>
                        <span th:unless="${dk.diem != null && dk.diem.diemTongKet != null}"
                              style="color: #999;">---</span>
                    </td>
                    <td>
                        <div th:if="${dk.diem != null && dk.diem.diemTongKet != null}">
                            <span class="badge badge-score" 
                                  th:text="${dk.diem.diemTongKet >= 8.5 ? 'Xuất sắc' : (dk.diem.diemTongKet >= 7 ? 'Tốt' : (dk.diem.diemTongKet >= 5.5 ? 'Khá' : (dk.diem.diemTongKet >= 4 ? 'Đạt' : 'Không đạt')))}"></span>
                        </div>
                        <div th:unless="${dk.diem != null && dk.diem.diemTongKet != null}">
                            <span class="badge badge-noscore">Chưa nhập</span>
                        </div>
                    </td>
                    <td>
                        <a th:href="@{'/giangvien/lopmonhoc/' + ${lop.maLopMonHoc} + '/diem/' + ${dk.maDangKy}}" class="action-link">
                            <button class="action-btn btn-score" type="button">📊 Nhập điểm</button>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
