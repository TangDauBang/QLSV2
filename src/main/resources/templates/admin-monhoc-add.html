<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Môn học mới</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset và font chữ đồng bộ với file mẫu */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
        }

        /* Sidebar đồng bộ với file mẫu */
        .sidebar {
            width: 230px;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: fixed;
            color: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar h2 {
            text-align: center;
            padding: 25px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            font-size: 20px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            border-left-color: #fff;
            padding-left: 25px;
        }

        /* Main content */
        .main {
            margin-left: 230px;
            padding: 25px;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        /* Form container */
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 700px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }

        /* Input - đồng bộ với file mẫu */
        input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Alert lỗi (giữ inline style trong HTML nhưng override cho đồng bộ) */
        div[style*="background: #fee"] {
            background: #f8d7da !important;
            color: #721c24 !important;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
            font-size: 14px;
        }

        /* Buttons */
        .form-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f2f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                transform: translateX(-100%);
            }
            .main {
                margin-left: 0;
                padding: 15px;
            }
            .form-container {
                padding: 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 15px;
            }
            .form-group {
                min-width: auto;
            }
            .form-buttons {
                flex-direction: column;
            }
            .form-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📊 Admin</h2>
    <a th:href="@{/admin}">🏠 Trang chủ</a>
    <a th:href="@{/admin/sinhvien}">👨‍🎓 Sinh viên</a>
    <a th:href="@{/admin/giangvien}">👨‍🏫 Giảng viên</a>
    <a th:href="@{/admin/monhoc}" class="active">📚 Môn học</a>
    <a th:href="@{/admin/lopmonhoc}">📖 Lớp môn học</a>
    <a th:href="@{/admin/dangkyhoc}">📝 Đăng ký học</a>
    <a th:href="@{/logout}">🚪 Đăng xuất</a>  
</div>

<div class="main">
    <h1>➕ Thêm môn học mới</h1>

    <div class="form-container">
        <form th:action="@{/admin/monhoc/save}" th:object="${monHoc}" method="post" novalidate>
            <div th:if="${error}" style="background: #fee; color: #c33; padding: 12px; border-radius: 6px; margin-bottom: 20px;">
                <strong>Lỗi:</strong> <span th:text="${error}"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="tenMon">Tên môn học <span style="color: #e74c3c;">*</span></label>
                    <input type="text" id="tenMon" th:field="*{tenMon}" placeholder="Nhập tên môn học" required />
                </div>
                <div class="form-group">
                    <label for="soTinChi">Số tín chỉ <span style="color: #e74c3c;">*</span></label>
                    <input type="number" id="soTinChi" th:field="*{soTinChi}" placeholder="VD: 3" min="1" max="10" required />
                </div>
            </div>

            <div class="form-group">
                <label for="khoa">Khoa</label>
                <input type="text" id="khoa" th:field="*{khoa}" placeholder="CNTT, Kinh tế..." />
            </div>

            <div class="form-buttons">
                <a th:href="@{/admin/monhoc}">
                    <button type="button" class="btn-secondary">❌ Hủy</button>
                </a>
                <button type="submit" class="btn-primary">💾 Lưu môn học</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.querySelector('form');
        const tenMonInput = document.getElementById('tenMon');
        const soTinChiInput = document.getElementById('soTinChi');

        tenMonInput.addEventListener('blur', function() {
            if (this.value.trim().length < 2) {
                this.setCustomValidity('Tên môn ít nhất 2 ký tự!');
                this.style.borderColor = '#e74c3c';
            } else {
                this.setCustomValidity('');
                this.style.borderColor = '#e0e0e0';
            }
        });

        soTinChiInput.addEventListener('blur', function() {
            const val = parseInt(this.value);
            if (this.value && (isNaN(val) || val < 1 || val > 10)) {
                this.setCustomValidity('Số tín chỉ từ 1-10!');
                this.style.borderColor = '#e74c3c';
            } else {
                this.setCustomValidity('');
                this.style.borderColor = '#e0e0e0';
            }
        });

        form.addEventListener('submit', function(e) {
            const requiredFields = form.querySelectorAll('[required]');
            let valid = true;
            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    field.style.borderColor = '#e74c3c';
                    valid = false;
                }
            });
            if (!valid) {
                e.preventDefault();
                alert('Vui lòng điền đầy đủ các trường bắt buộc (*)!');
            }
        });
    });
</script>

</body>
</html>
