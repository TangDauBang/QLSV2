<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lớp Đã Đăng Ký - Sinh Viên</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }

        .sidebar {
            width: 230px;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: fixed;
            color: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar h2 {
            text-align: center;
            padding: 25px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            font-size: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #fff;
            padding-left: 25px;
        }

        .main {
            margin-left: 230px;
            padding: 25px;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        /* Search & Filter Section */
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-form select {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            min-width: 120px;
            transition: border-color 0.3s;
        }

        .search-form select:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-form input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 250px;
            transition: border-color 0.3s;
        }

        .search-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-search {
            background: #667eea;
            color: white;
        }

        .btn-search:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f2f5;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-register {
            background: #27ae60;
            color: white;
            float: right;
            text-decoration: none;
        }

        .btn-register:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f2f5;
        }

        tbody tr {
            transition: background 0.3s;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Action buttons */
        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-view {
            background: #3498db;
            color: white;
        }

        .btn-view:hover {
            background: #2980b9;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.3);
        }

        /* Status badges */
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-score {
            background: #d4edda;
            color: #155724;
        }

        .badge-noscore {
            background: #fff3cd;
            color: #856404;
        }

        /* Info text */
        .info-text {
            color: #666;
            font-size: 13px;
            margin: 0 2px;
        }

        /* Alert box */
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Empty message */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            align-items: center;
        }

        .action-buttons::after {
            content: '';
            clear: both;
            display: table;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 0;
            }
            .main {
                margin-left: 0;
            }
            .search-form {
                flex-direction: column;
            }
            .btn-register {
                float: none;
                width: 100%;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Sinh Viên</h2>
    <a th:href="@{/sinhvien/home}">🏠 Trang chủ</a>
    <a th:href="@{/sinhvien/dangkyhoc}" class="active">📚 Lớp đã đăng ký</a>
    <a th:href="@{/sinhvien/dangkyhoc/register}">➕ Đăng ký lớp</a>
    <a th:href="@{/sinhvien/profile}">👤 Thông tin cá nhân</a>
    <a th:href="@{/sinhvien/password/change}">🔐 Đổi mật khẩu</a>
</div>

<div class="main">
    <h1>📚 Lớp Đã Đăng Ký</h1>

    <!-- Alert Messages -->
    <div th:if="${success}" class="alert alert-success">
        ✓ <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        ⚠️ <span th:text="${error}"></span>
    </div>

    <!-- Search & Filter -->
    <div class="search-section">
        <form th:action="@{/sinhvien/dangkyhoc}" method="get" class="search-form">
            <select name="searchType">
                <option value="">-- Tìm kiếm theo --</option>
                <option value="monhoc" th:selected="${searchType == 'monhoc'}">Môn học</option>
                <option value="giangvien" th:selected="${searchType == 'giangvien'}">Giảng viên</option>
            </select>
            
            <input type="text" name="search" th:value="${search}" 
                   placeholder="🔍 Nhập từ khóa tìm kiếm..." />
            
            <button type="submit" class="btn btn-search">🔍 Tìm kiếm</button>
            <a th:href="@{/sinhvien/dangkyhoc}">
                <button type="button" class="btn btn-reset">❌ Xóa bộ lọc</button>
            </a>
        </form>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <a th:href="@{/sinhvien/dangkyhoc/register}">
            <button class="btn btn-register">➕ Đăng ký lớp mới</button>
        </a>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 6%;">Mã ĐK</th>
                    <th style="width: 14%;">Môn học</th>
                    <th style="width: 12%;">Giảng viên</th>
                    <th style="width: 6%;">Nhóm</th>
                    <th style="width: 10%;">Ngày - Tiết</th>
                    <th style="width: 10%;">Phòng</th>
                    <th style="width: 12%;">Điểm TK</th>
                    <th style="width: 14%;">Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(danhSachDangKy)}">
                    <td colspan="8" class="empty-message">
                        📭 Bạn chưa đăng ký lớp nào. <a th:href="@{/sinhvien/dangkyhoc/register}">Đăng ký ngay</a>
                    </td>
                </tr>
                <tr th:each="dk : ${danhSachDangKy}">
                    <td th:text="${dk.maDangKy}"></td>
                    <td>
                        <strong th:text="${dk.lopMonHoc.monHoc.tenMon}"></strong>
                        <br/>
                        <span class="info-text" th:text="${'Tín chỉ: ' + dk.lopMonHoc.monHoc.soTinChi}"></span>
                    </td>
                    <td th:text="${dk.lopMonHoc.giangVien.hoTen}"></td>
                    <td th:text="${dk.lopMonHoc.nhom}"></td>
                    <td>
                        <span th:text="${dk.lopMonHoc.ngayHoc}"></span>
                        <br/>
                        <span class="info-text" th:text="${'Tiết ' + dk.lopMonHoc.tietBatDau + '-' + dk.lopMonHoc.tietKetThuc}"></span>
                    </td>
                    <td th:text="${dk.lopMonHoc.phongHoc}"></td>
                    <td>
                        <div th:if="${dk.diem != null and dk.diem.diemTongKet != null}">
                            <span class="badge badge-score" th:text="${#numbers.formatDecimal(dk.diem.diemTongKet, 0, 1) + ' ✓'}"></span>
                        </div>
                        <div th:unless="${dk.diem != null and dk.diem.diemTongKet != null}">
                            <span class="badge badge-noscore">Chưa có</span>
                        </div>
                    </td>
                    <td>
                        <a th:href="@{'/sinhvien/dangkyhoc/diem/' + ${dk.maDangKy}}">
                            <button class="action-btn btn-view">📊 Xem điểm</button>
                        </a>
                        <a th:if="${dk.diem == null}" th:href="@{'/sinhvien/dangkyhoc/cancel/' + ${dk.maDangKy}}" 
                           onclick="return confirm('Bạn chắc chắn muốn hủy đăng ký lớp này?');">
                            <button class="action-btn btn-cancel">❌ Hủy</button>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
