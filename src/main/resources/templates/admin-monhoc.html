<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Môn học</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
        }

        /* Sidebar đồng bộ */
        .sidebar {
            width: 230px;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: fixed;
            color: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .sidebar h2 {
            text-align: center;
            padding: 25px 0;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            font-size: 20px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #fff;
            padding-left: 25px;
        }

        /* Main content */
        .main {
            margin-left: 230px;
            padding: 25px;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        /* Form card */
        .form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-form input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 250px;
            transition: border-color 0.3s;
        }

        .search-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-search {
            background: #667eea;
            color: white;
        }

        .btn-search:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f2f5;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-add {
            background: #27ae60;
            color: white;
        }

        .btn-add:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 10px;
            overflow: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 700px;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid rgba(0,0,0,0.1);
        }

        td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #f0f2f5;
        }

        tbody tr {
            transition: background 0.3s;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Action buttons */
        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-edit {
            background: #3498db;
            color: white;
        }

        .btn-edit:hover {
            background: #2980b9;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.3);
        }

        /* Empty message */
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                transform: translateX(-100%);
            }
            .main {
                margin-left: 0;
            }
            .search-form {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📊 Admin</h2>
    <a th:href="@{/admin}">🏠 Trang chủ</a>
    <a th:href="@{/admin/sinhvien}" class="active">👨‍🎓 Sinh viên</a>
    <a th:href="@{/admin/giangvien}">👨‍🏫 Giảng viên</a>
    <a th:href="@{/admin/monhoc}">📚 Môn học</a>
    <a th:href="@{/admin/lopmonhoc}">📖 Lớp môn học</a>
    <a th:href="@{/admin/dangkyhoc}">📝 Đăng ký học</a>
    <a th:href="@{/logout}">🚪 Đăng xuất</a>
</div>

<div class="main">
    <h1>📚 Quản lý Môn học</h1>

    <!-- Search Form -->
    <div class="form">
        <form th:action="@{/admin/monhoc}" method="get" class="search-form">
            <input type="text" name="search" th:value="${search}" placeholder="🔍 Tìm kiếm môn học theo tên môn học" />
            <button type="submit" class="btn btn-search">🔍 Tìm kiếm</button>
            <a th:href="@{/admin/monhoc}">
                <button type="button" class="btn btn-reset">❌ Xóa bộ lọc</button>
            </a>
        </form>
    </div>

    <!-- Add Button -->
    <div class="form" style="display: flex; justify-content: flex-start; padding: 15px 20px;">
        <a th:href="@{/admin/monhoc/add}">
            <button class="btn btn-add">➕ Thêm môn học mới</button>
        </a>
    </div>

    <!-- Table -->
    <div class="table-container">
        <table th:if="${#lists.isEmpty(listMonHoc)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên môn</th>
                    <th>Số tín chỉ</th>
                    <th>Khoa</th>
                    <th>Hành động</th>
                </tr>
            </thead>
        </table>
        <table th:unless="${#lists.isEmpty(listMonHoc)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên môn</th>
                    <th>Số tín chỉ</th>
                    <th>Khoa</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="mh : ${listMonHoc}">
                    <td th:text="${mh.maMon}"></td>
                    <td th:text="${mh.tenMon}"></td>
                    <td th:text="${mh.soTinChi}"></td>
                    <td th:text="${mh.khoa}"></td>
                    <td>
                        <a th:href="@{'/admin/monhoc/edit/' + ${mh.maMon}}">
                            <button class="action-btn btn-edit">✏️ Sửa</button>
                        </a>
                        <a th:href="@{'/admin/monhoc/delete/' + ${mh.maMon}}" 
                           onclick="return confirm('Bạn chắc chắn muốn xóa môn học này?');">
                            <button class="action-btn btn-delete">🗑️ Xóa</button>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
